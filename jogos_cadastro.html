<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cadastro / Login</title>
  <link rel="stylesheet" href="jogos_cadastro.css" />
</head>
<body>
  <div class="background"></div>

  <nav>
    <a href="#home" tabindex="1">Home</a>
    <a href="#service" tabindex="2">Interface</a>
    <a href="#about" tabindex="4">Outros</a>
  </nav>


  <main class="form-container" role="main" aria-live="polite">
    <h2 id="form-title">Sign Up</h2>
    <input
      type="email"
      id="email"
      placeholder="Email"
      aria-label="Email"
      required
      autocomplete="username"
      tabindex="7"
    />
    <input
      type="password"
      id="password"
      placeholder="Password"
      aria-label="Password"
      required
      autocomplete="current-password"
      tabindex="8"
    />
    <button class="submit-btn" id="submit-btn" tabindex="9">Sign Up</button>

    <span class="toggle-link" id="toggle-link" tabindex="10" role="button" aria-pressed="false">
      Já é membro? Faça login
    </span>

    <div class="message" id="message" aria-live="assertive"></div>
  </main>

  <script src="jogos_cadastro.js"></script>
</body>
</html>
